##: Fonts
font_family FiraCode Nerd Font Mono
font_size 12.0

allow_remote_control yes
copy_on_select yes
cursor_blink_interval 0
map cmd+enter send_text all \x1B\x0D
remember_window_size no
strip_trailing_spaces always
tab_bar_edge top
tab_bar_style hidden
window_border_width 0

##: Themes
background #2b2c2e
foreground #d2d8d9
cursor #708183
selection_background #e3e8ed
color0 #7c8a8f
color8 #888888
color1 #b23a51
color9 #f24840
color2 #789a69
color10 #80c46f
color3 #b9ab4a
color11 #ffeb62
color4 #2a7fac
color12 #4095ff
color5 #bc4f5a
color13 #fb5175
color6 #44a799
color14 #52ccbd
color7 #d2d8d9
color15 #d2d8d9
selection_foreground #2b2c2e

##: Mac OS specific settings
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_show_window_title_in window
